services:
  app:
    image: elaxdev/nihongotracker:latest
    ports:
      - '3000:3000'
    env_file:
      - Backend/.env
    environment:
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-nihongotracker-master-key}
    depends_on:
      mongo:
        condition: service_healthy
      meilisearch:
        condition: service_started
    volumes:
      - ./Backend/.env:/app/Backend/.env:ro
    networks:
      - nginx_default
    restart: always

  mongo:
    image: mongo:7
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - nginx_default
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" | grep 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: always
    ports:
      - '7700:7700'
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: 'true'
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-nihongotracker-master-key}
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - nginx_default

  migration:
    profiles: ['migration']
    image: elaxdev/nihongotracker:latest
    env_file:
      - Backend/.env
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - NODE_ENV=production
    command: >
      sh -c "cd /app/Backend && 
             npm run migrate:indexes:prod && 
             echo 'Migration completed successfully'"
    restart: 'no'
    networks:
      - nginx_default

volumes:
  mongo-data:
  meilisearch-data:

networks:
  nginx_default:
    external: true
